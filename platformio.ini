; PlatformIO Project Configuration
; Universal Modbus-MQTT Bridge v2.2 for Waveshare ESP32-S3-ETH V1.0
; 16MB flash, 8MB OPI PSRAM, built-in W5500 SPI Ethernet chip

; ─── Development build (full debug) ───────────────────────────
[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

upload_speed = 460800
monitor_speed = 115200

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM=1
    -DUSE_W5500

board_build.partitions = partitions_16mb.csv
board_build.flash_mode = dio
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0
    arduino-libraries/Ethernet@^2.0.2
    links2004/WebSockets@^2.4

; ModbusMaster uses local patched copy in lib/ModbusMaster/
; (ku16MBResponseTimeout made runtime-configurable)

; ─── Production build (errors + info only, no debug) ──────────
[env:esp32-s3-prod]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

upload_speed = 460800
monitor_speed = 115200

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM=1
    -DUSE_W5500

board_build.arduino.memory_type = dio_opi
board_build.partitions = partitions_16mb.csv
board_build.flash_mode = dio
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0
    arduino-libraries/Ethernet@^2.0.2
    links2004/WebSockets@^2.4